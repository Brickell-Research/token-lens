name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag || github.ref }}
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.4.1"
        bundler-cache: true

    - name: Extract version from tag
      id: version
      run: |
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Releasing version: $VERSION"

    - name: Verify version matches tag
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        GEM_VERSION=$(ruby -e 'require_relative "lib/token_lens/version"; puts TokenLens::VERSION')
        if [ "$GEM_VERSION" != "$VERSION" ]; then
          echo "ERROR: version.rb has $GEM_VERSION but tag is v$VERSION"
          exit 1
        fi
        echo "Version verified: $GEM_VERSION"

    - name: Run tests
      run: bundle exec rspec

    - name: Build gem
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        gem build token-lens.gemspec
        echo "Built: $(ls token-lens-*.gem)"

    - name: Generate release notes
      id: release_notes
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p dist
        PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
        if [ -z "$PREV_TAG" ]; then
          echo "## token-lens v${VERSION}" > dist/release-notes.md
          echo "" >> dist/release-notes.md
          echo "Initial release." >> dist/release-notes.md
        else
          echo "## token-lens v${VERSION}" > dist/release-notes.md
          echo "" >> dist/release-notes.md
          git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" >> dist/release-notes.md
        fi
        cat dist/release-notes.md

    - name: Check if release exists
      id: check_release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$TAG" &>/dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        body_path: dist/release-notes.md
        files: token-lens-${{ steps.version.outputs.version }}.gem

    - name: Publish to RubyGems
      env:
        VERSION: ${{ steps.version.outputs.version }}
        GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      run: |
        gem push token-lens-${VERSION}.gem
        echo "Published token-lens v${VERSION} to RubyGems"
