name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint:check
      - run: bun run test
      - run: bun run build

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binaries
        run: |
          mkdir -p dist
          bun build --compile --minify --target=bun-linux-x64 src/index.ts --outfile dist/token-lens-linux-x64
          bun build --compile --minify --target=bun-darwin-arm64 src/index.ts --outfile dist/token-lens-darwin-arm64
          bun build --compile --minify --target=bun-darwin-x64 src/index.ts --outfile dist/token-lens-darwin-x64
          bun build --compile --minify --target=bun-windows-x64 src/index.ts --outfile dist/token-lens-windows-x64.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/token-lens-linux-x64
            dist/token-lens-darwin-arm64
            dist/token-lens-darwin-x64
            dist/token-lens-windows-x64.exe
